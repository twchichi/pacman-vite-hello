<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"
    />
    <title>Pac-Man</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background: #111;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        font-family: 'Courier New', monospace;
        color: #fff;
        overflow: hidden;
        touch-action: none;
        user-select: none;
        -webkit-user-select: none;
      }

      #ui-header {
        width: 100%;
        max-width: 440px;
        display: flex;
        justify-content: space-between;
        padding: 8px 12px;
        font-size: 14px;
        color: #ff0;
      }

      #game-wrapper {
        position: relative;
        border: 3px solid #3366ff;
        border-radius: 4px;
        background: #000;
      }

      canvas {
        display: block;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }

      #overlay {
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: rgba(0,0,0,0.85);
        z-index: 10;
        transition: opacity 0.3s;
      }

      #overlay.hidden {
        opacity: 0;
        pointer-events: none;
      }

      #overlay h1 {
        font-size: 28px;
        color: #ff0;
        margin: 0 0 12px 0;
        text-shadow: 2px 2px #000;
      }

      #overlay p {
        font-size: 14px;
        color: #aaa;
        margin: 4px 0;
      }

      #overlay .score-line {
        font-size: 18px;
        color: #0f0;
        margin: 8px 0;
      }

      #start-btn {
        margin-top: 16px;
        padding: 12px 32px;
        font-size: 16px;
        font-family: monospace;
        background: #ff0;
        color: #000;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
      }

      #start-btn:active {
        background: #cc0;
      }

      /* D-Pad for mobile */
      #dpad {
        display: none;
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        width: 200px;
        height: 200px;
        z-index: 50;
      }

      @media (pointer: coarse) {
        #dpad { display: grid; }
        #ui-header { font-size: 12px; }
      }

      .dpad-btn {
        width: 60px;
        height: 60px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        color: #fff;
        background: rgba(255,255,255,0.12);
        border: 2px solid rgba(255,255,255,0.3);
        border-radius: 12px;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
        transition: background 0.1s;
      }

      .dpad-btn:active, .dpad-btn.pressed {
        background: rgba(255,255,0,0.35);
        border-color: #ff0;
      }

      .dpad-empty { visibility: hidden; }

      .dpad-up { grid-row: 1; grid-column: 2; }
      .dpad-left { grid-row: 2; grid-column: 1; }
      .dpad-right { grid-row: 2; grid-column: 3; }
      .dpad-down { grid-row: 3; grid-column: 2; }

      #swipe-hint {
        display: none;
        color: rgba(255,255,255,0.4);
        font-size: 12px;
        margin-top: 8px;
      }
      @media (pointer: coarse) {
        #swipe-hint { display: block; }
      }
    </style>
  </head>
  <body>
    <div id="ui-header">
      <span id="score-text">Score: 0</span>
      <span id="lives-text">Lives: 3</span>
    </div>

    <div id="game-wrapper">
      <canvas id="game" width="440" height="440"></canvas>
      <div id="overlay">
        <h1>PAC-MAN</h1>
        <p>方向鍵 / WASD 移動</p>
        <p>手機：使用下方方向鍵</p>
        <button id="start-btn">START</button>
      </div>
    </div>

    <div id="dpad">
      <div class="dpad-btn dpad-up" data-dir="up">▲</div>
      <div class="dpad-btn dpad-left" data-dir="left">◀</div>
      <div class="dpad-btn dpad-empty"></div>
      <div class="dpad-btn dpad-right" data-dir="right">▶</div>
      <div class="dpad-btn dpad-down" data-dir="down">▼</div>
    </div>

    <div id="swipe-hint">或滑動螢幕控制方向</div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
