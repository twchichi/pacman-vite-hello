name: Coverage Check

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - name: Run tests with coverage
        run: npx vitest run --coverage
      - name: Check coverage threshold
        run: |
          echo "Coverage report generated. Check vitest output above."
          echo "If coverage < 70%, the build should have failed."
